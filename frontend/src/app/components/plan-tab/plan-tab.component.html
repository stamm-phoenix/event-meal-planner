<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
  @for (day of projectService.currentProject()?.days ?? []; track day) {
    <p-card>
      <ng-template #header>
        <div class="flex justify-between items-center px-4 pt-4">
          <h3 class="font-bold m-0">{{ formatDate(day) }}</h3>
          <p-button
            icon="pi pi-plus"
            [text]="true"
            [rounded]="true"
            severity="secondary"
            size="small"
            aria-label="Mahlzeit hinzufügen"
            (onClick)="openAddMealDialog(day)"
          />
        </div>
      </ng-template>
      <div class="space-y-4">
        @for (block of getMealBlocksForDay(day); track block.id) {
          <app-meal-block-card [block]="block" />
        }
      </div>
    </p-card>
  }
</div>

<!-- Add/Edit Meal Block Dialog -->
<p-dialog
  [(visible)]="showMealDialog"
  [header]="editingBlockId() ? 'Mahlzeit bearbeiten' : 'Neue Mahlzeit'"
  [modal]="true"
  [style]="{ width: '400px' }"
  [draggable]="false"
>
  <div class="space-y-4 pt-2">
    <div>
      <label for="mealTime" class="block text-xs text-gray-500 mb-1">Uhrzeit</label>
      <input
        id="mealTime"
        type="time"
        [value]="mealForm().time"
        (input)="mealForm.set({ ...mealForm(), time: $any($event.target).value })"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"
      />
    </div>
    <div>
      <label for="mealLabel" class="block text-xs text-gray-500 mb-1">Bezeichnung</label>
      <input
        id="mealLabel"
        type="text"
        [value]="mealForm().label"
        (input)="mealForm.set({ ...mealForm(), label: $any($event.target).value })"
        placeholder="z.B. Frühstück, Mittagessen..."
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"
      />
    </div>
    <div>
      <label for="mealPerson" class="block text-xs text-gray-500 mb-1">Verantwortliche Person</label>
      <input
        id="mealPerson"
        type="text"
        [value]="mealForm().responsiblePerson"
        (input)="mealForm.set({ ...mealForm(), responsiblePerson: $any($event.target).value })"
        placeholder="Name..."
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"
      />
    </div>
  </div>
  <ng-template #footer>
    <p-button label="Abbrechen" severity="secondary" (onClick)="showMealDialog.set(false)" />
    <p-button label="Speichern" (onClick)="saveMeal()" />
  </ng-template>
</p-dialog>
