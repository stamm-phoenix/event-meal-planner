<p-card>
  <ng-template #header>
    <div class="flex justify-between items-center px-6 pt-6">
      <div>
        <h2 class="text-2xl font-bold m-0">Zutatenliste</h2>
        <p class="text-sm text-gray-500 mt-1 m-0">Zentrale Definition aller Zutaten</p>
      </div>
      <p-button icon="pi pi-plus" label="Neu" [rounded]="true" severity="secondary" (onClick)="openAddDialog()" />
    </div>
  </ng-template>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    @for (mi of sortedIngredients(); track mi.id) {
      <div class="bg-gray-50 border rounded-xl p-4 group hover:border-gray-400 transition-all flex flex-col justify-between">
        <div>
          <div class="flex justify-between items-start mb-3">
            <div>
              <h3 class="text-base font-bold m-0">{{ mi.name }}</h3>
              <p class="text-xs text-gray-500 mt-1 m-0">{{ mi.category }}</p>
            </div>
            <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
              <p-button
                icon="pi pi-pencil"
                severity="secondary"
                [text]="true"
                [rounded]="true"
                size="small"
                (onClick)="openEditDialog(mi)"
              />
              <p-button
                icon="pi pi-trash"
                severity="danger"
                [text]="true"
                [rounded]="true"
                size="small"
                [disabled]="getUsage(mi).length > 0"
                (onClick)="deleteIngredient(mi)"
              />
            </div>
          </div>
          <div class="space-y-3">
            <div>
              <label class="block text-xs text-gray-500 mb-1">Standard-Einheit</label>
              <p class="text-sm font-mono m-0">{{ mi.unit }}</p>
            </div>
            <div>
              <label class="block text-xs text-gray-500 mb-1">Verwendung in Gerichten ({{ getUsage(mi).length }})</label>
              <div class="flex flex-wrap gap-1 mt-1">
                @if (getUsage(mi).length > 0) {
                  @for (d of getUsage(mi); track d.id) {
                    <span class="bg-white border text-xs px-2 py-0.5 rounded">{{ d.name }}</span>
                  }
                } @else {
                  <span class="text-xs text-gray-400 italic">Nicht verwendet</span>
                }
              </div>
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</p-card>

<!-- Add/Edit Master Ingredient Dialog -->
<p-dialog [header]="editingId ? 'Zutat bearbeiten' : 'Neue Zutat'" [(visible)]="showDialog" [modal]="true" [style]="{ width: '28rem' }">
  <div class="space-y-4">
    <div>
      <label class="block text-xs text-gray-500 mb-1">Name</label>
      <input type="text" pInputText [(ngModel)]="formData.name" placeholder="z.B. Kartoffeln" class="w-full" />
    </div>
    <div>
      <label class="block text-xs text-gray-500 mb-1">Einheit</label>
      <input type="text" pInputText [(ngModel)]="formData.unit" placeholder="z.B. g, kg, Stk" class="w-full" />
    </div>
    <div>
      <label class="block text-xs text-gray-500 mb-1">Kategorie</label>
      <input type="text" pInputText [(ngModel)]="formData.category" placeholder="z.B. Gemüse, Kühlregal" class="w-full" />
    </div>
  </div>
  <ng-template #footer>
    <p-button label="Abbrechen" severity="secondary" (onClick)="showDialog.set(false)" />
    <p-button label="Speichern" (onClick)="save()" />
  </ng-template>
</p-dialog>
